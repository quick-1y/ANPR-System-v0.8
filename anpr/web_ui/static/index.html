<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANPR Web UI — Stage 4</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>ANPR Web UI</h1>
    <p class="subtitle">Этап 4: dashboard каналов, события в реальном времени и конфигуратор</p>
  </header>

  <main>
    <section class="panel">
      <h2>Каналы (Core Service)</h2>
      <div class="toolbar">
        <button id="refreshChannelsBtn">Обновить</button>
      </div>
      <table id="channelsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Источник</th>
            <th>Статус</th>
            <th>Профиль видео</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="panel">
      <h2>События ANPR (polling)</h2>
      <div class="toolbar">
        <button id="subscribeBtn">Подписаться</button>
        <span id="subscriberInfo">Подписка не активна</span>
      </div>
      <div id="eventsContainer" class="cards"></div>
    </section>

    <section class="panel">
      <h2>Конфигуратор канала</h2>
      <form id="channelForm">
        <label>ID канала <input name="id" required placeholder="gate-1" /></label>
        <label>Имя <input name="name" required placeholder="Въезд" /></label>
        <label>Источник <input name="source" required placeholder="rtsp://..." /></label>
        <label>ROI включен <input type="checkbox" name="roi_enabled" checked /></label>
        <label>Профиль видео
          <select name="video_profile">
            <option value="high">high</option>
            <option value="medium" selected>medium</option>
            <option value="low">low</option>
          </select>
        </label>
        <button type="submit">Создать канал + поток</button>
      </form>
      <p id="formStatus"></p>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
