version: '3.9'
services:
  api:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      POSTGRES_DSN: "postgresql://anpr:anpr@postgres:5432/anpr"
    command: bash -lc "pip install -r requirements.txt && uvicorn apps.api.main:app --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  retention_worker:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      POSTGRES_DSN: "postgresql://anpr:anpr@postgres:5432/anpr"
    command: bash -lc "pip install -r requirements.txt && uvicorn apps.worker.main:app --host 0.0.0.0 --port 8092"
    ports:
      - "8092:8092"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: anpr
      POSTGRES_USER: anpr
      POSTGRES_PASSWORD: anpr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anpr -d anpr"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
